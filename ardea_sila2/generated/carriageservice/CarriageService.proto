syntax = "proto3";

import "SiLAFramework.proto";

package sila2.jp.riken.ardea.carriageservice.v1;

/* Ardea travel-carriage orchestration over the KEYENCE PLC (KV COM+). Reports the carriage position and moves the carriage to a target, but only when the DENSO robot is at a movable pose (base or retract). The move writes target/speed/accel, raises the move-request bit, waits for completion, and always clears the request bit afterwards. Speed and acceleration are fixed in the motion configuration. */
service CarriageService {
  /* 
      Move the travel carriage to the target given by StationId, but only if the
      robot is at the base or retract pose and the carriage is ready. Intermediate
      responses report the current position [mm] while moving; the request bit is
      always cleared when the command finishes.
     */
  rpc MoveCarriage (sila2.jp.riken.ardea.carriageservice.v1.MoveCarriage_Parameters) returns (sila2.org.silastandard.CommandConfirmation) {}
  /* Monitor the state of MoveCarriage */
  rpc MoveCarriage_Info (sila2.org.silastandard.CommandExecutionUUID) returns (stream sila2.org.silastandard.ExecutionInfo) {}
  /* Retrieve intermediate responses of MoveCarriage */
  rpc MoveCarriage_Intermediate (sila2.org.silastandard.CommandExecutionUUID) returns (stream sila2.jp.riken.ardea.carriageservice.v1.MoveCarriage_IntermediateResponses) {}
  /* Retrieve result of MoveCarriage */
  rpc MoveCarriage_Result(sila2.org.silastandard.CommandExecutionUUID) returns (sila2.jp.riken.ardea.carriageservice.v1.MoveCarriage_Responses) {}
  /* 
      The current travel-carriage position [mm] (signed 32-bit device D6010),
      streamed periodically to subscribers.
     */
  rpc Subscribe_CarriagePosition (sila2.jp.riken.ardea.carriageservice.v1.Subscribe_CarriagePosition_Parameters) returns (stream sila2.jp.riken.ardea.carriageservice.v1.Subscribe_CarriagePosition_Responses) {}
}

/* Parameters for MoveCarriage */
message MoveCarriage_Parameters {
  sila2.org.silastandard.String StationId = 1;  /* Target station identifier. For now this is parsed as an integer millimetre position and used directly as the target (temporary; it will become a fixed station-number-to-millimetre mapping later). */
}

/* Responses of MoveCarriage */
message MoveCarriage_Responses {
  sila2.org.silastandard.Real FinalPosition = 1;  /* The carriage position [mm] after the move completed. */
}

/* Intermediate responses of MoveCarriage */
message MoveCarriage_IntermediateResponses {
  sila2.org.silastandard.Real CurrentPosition = 1;  /* The carriage position [mm] observed during the move. */
}

/* Parameters for CarriagePosition */
message Subscribe_CarriagePosition_Parameters {
}

/* Responses of CarriagePosition */
message Subscribe_CarriagePosition_Responses {
  sila2.org.silastandard.Real CarriagePosition = 1;  /* The current travel-carriage position [mm] (signed 32-bit device D6010), streamed periodically to subscribers. */
}
