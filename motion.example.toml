# Example Ardea motion / calibration configuration (see orchestration_design.md §4.4).
# Copy to motion.toml and adjust for your machine, then start the server with:
#   uv run python -m ardea_sila2 --config config.toml --motion-config motion.toml --insecure
#
# Kept separate from config.toml because wrong values risk a physical collision.
# Poses are compared on the first 6 joint axes (J1..J6) within tolerance_deg.
# The values below were measured on our robot (192.168.0.11) on 2026-07-08;
# RE-MEASURE them for your own machine.

[base_pose]      # home/origin pose (reached by task PickUp2; also the initial pose)
joint_angles_deg = [89.994, 25.005, -115.007, 180.027, 89.998, -90.009]
tolerance_deg    = 0.05   # loosened from 0.01: retract-pose J3 varied ~0.02° depending on how it was reached

[retract_pose]   # retract pose. Carriage move allowed at base_pose OR retract_pose.
joint_angles_deg = [90.007, 25.003, -114.999, 120.002, 89.998, -89.999]
tolerance_deg    = 0.05

[carriage]                  # travel-carriage motion parameters (fixed; not command args)
default_speed_mm_s = 50     # positioning speed [mm/s]
accel_mm_s_ms      = 1      # accel/decel [mm/s/ms]
range_min_mm       = 0      # lower travel bound [mm]
range_max_mm       = 2600   # upper travel bound [mm]
move_timeout_s     = 60     # max wait for a move to complete [s]
poll_interval_s    = 0.2    # status/position poll interval [s]

[hand]                      # gripper motion parameters (grip force fixed per hand doc)
closed_position = 0         # D5050 fully closed
open_position   = 140       # D5050 fully open
speed           = 0         # D5060 0=slowest..255=fastest
grip_force      = 1         # D5070 fixed
move_timeout_s  = 30

[pacscripts]                # DENSO task names run via TaskService.RunTask
pick_approach = "PickUp0"   # approach / grab position
pick_retract  = "PickUp1"   # retract -> ends at the retract pose
put_approach  = "PickUp0"   # Put currently reuses the same approach task
put_retract   = "PickUp1"   # retract -> ends at the retract pose
return_home   = "PickUp2"   # common: retract -> base pose (requires hand open)
