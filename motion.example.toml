# Example Ardea motion / calibration configuration (see orchestration_design.md §4.4).
# Copy to motion.toml and adjust for your machine, then start the server with:
#   uv run python -m ardea_sila2 --config config.toml --motion-config motion.toml --insecure
#
# Kept separate from config.toml because wrong values risk a physical collision.
# Poses are compared on the first 6 joint axes (J1..J6) within tolerance_deg.
# The values below were measured on our robot (192.168.0.11) on 2026-07-08;
# RE-MEASURE them for your own machine.

# task = PacScript that drives the arm to this pose (used by SetOrientation).
[base_pose]      # home/origin pose (also the initial pose)
joint_angles_deg = [89.994, 25.005, -115.007, 180.027, 89.998, -90.009]
tolerance_deg    = 0.1    # loosened 0.01 -> 0.05 -> 0.1: pose J3 varies with how the pose is reached
task             = "BasePosition"

[retract_pose]   # retract pose. Carriage move allowed at any of the 4 poses below.
joint_angles_deg = [90.007, 25.003, -114.999, 120.002, 89.998, -89.999]
tolerance_deg    = 0.1
task             = "RetractPosition"

# The two "inverse" poses are the base/retract poses turned 180° (J1 flipped ~-180°;
# the arm faces the opposite direction). Carriage move is also allowed at these. Measure
# each on the real arm (jog there, read CurJnt) and paste the values here.
[inverse_retract_pose]   # retract pose turned 180°
joint_angles_deg = [-89.993, 25.002, -115.001, 120.002, 89.999, -89.999]
tolerance_deg    = 0.1
task             = "InverseRetractPosition"

[inverse_base_pose]      # base pose turned 180°
joint_angles_deg = [-90.019, 25.006, -115.070, 180.018, 89.998, -90.013]
tolerance_deg    = 0.1
task             = "InverseBasePosition"

[carriage]                  # travel-carriage motion parameters (fixed; not command args)
default_speed_mm_s = 50     # positioning speed [mm/s]
accel_mm_s_ms      = 1      # accel/decel [mm/s/ms]
range_min_mm       = 0      # lower travel bound [mm]
range_max_mm       = 2600   # upper travel bound [mm]
move_timeout_s     = 60     # max wait for a move to complete [s]
poll_interval_s    = 0.2    # status/position poll interval [s]

[hand]                      # gripper motion parameters (grip force fixed per hand doc)
closed_position = 0         # D5050 close target for short-edge grip (fully closed)
closed_position_long = 110  # D5050 close target for long-edge grip (grip=long stations)
open_position   = 140       # D5050 fully open
speed           = 0         # D5060 0=slowest..255=fastest
grip_force      = 1         # D5070 fixed
move_timeout_s  = 30

[common]                    # tasks shared by all stations
return_home = "BasePosition"  # retract -> base pose (forward stations; requires hand open)
return_home_reverse = "InverseBasePosition"  # inverse retract -> inverse base (reverse stations)

# direction = arm facing: "forward" (normal poses) | "reverse" (180°-turned inverse poses).
# grip = plate grip orientation: "short"-edge | "long"-edge. Both default if omitted
# (forward/short) and are stored only for now (not yet wired into Pick/Put).
[stations.Base1]            # labware station "Base1" (add more [stations.<id>] as needed)
position_mm = 0             # carriage position [mm] for this station (must be unique)
script_a    = "PickUp0"     # approach task
script_b    = "PickUp1"     # retract task
direction   = "forward"     # forward | reverse
grip        = "short"       # short | long

[stations.Base2]            # labware station "Base2"
position_mm = 2600          # carriage position [mm] (must be unique, within travel range)
script_a    = "PickUp3"     # approach task
script_b    = "PickUp4"     # retract task
direction   = "forward"     # forward | reverse
grip        = "short"       # short | long
